<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nakh AI</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Vazirmatn:wght@400;500;600;700&display=swap');
    body { font-family: 'Vazirmatn', system-ui, sans-serif; }
    .glass { background: rgba(255,255,255,0.06); backdrop-filter: blur(32px); border: 1px solid rgba(255,255,255,0.1); }
    .message { animation: bubble 0.4s ease forwards; }
    @keyframes bubble { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
  </style>
  <link rel="manifest" href="manifest.json">
<script src="service-worker.js"></script>
<script>
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('service-worker.js')
      .then(() => console.log('Service Worker registered successfully'))
      .catch(err => console.log('Service Worker registration failed:', err));
  }
</script>
</head>
<body class="bg-zinc-950 text-white min-h-screen flex overflow-hidden">
  <div class="flex h-screen w-full">
    <!-- Sidebar -->
    <div class="w-80 glass border-r border-white/10 flex flex-col">
      <div class="p-6 flex items-center gap-3 border-b border-white/10">
        <!-- لوگو نخ ظریف -->
        <svg width="42" height="42" viewBox="0 0 42 42" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="11" cy="11" r="3.5" fill="#e5e7eb"/>
          <circle cx="31" cy="11" r="3.5" fill="#e5e7eb"/>
          <circle cx="11" cy="31" r="3.5" fill="#e5e7eb"/>
          <circle cx="31" cy="31" r="3.5" fill="#e5e7eb"/>
          <circle cx="21" cy="21" r="3.5" fill="#e5e7eb"/>
          <line x1="11" y1="11" x2="31" y2="11" stroke="#e5e7eb" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="11" y1="31" x2="31" y2="31" stroke="#e5e7eb" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="11" y1="11" x2="11" y2="31" stroke="#e5e7eb" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="31" y1="11" x2="31" y2="31" stroke="#e5e7eb" stroke-width="2.5" stroke-linecap="round"/>
          <line x1="11" y1="11" x2="31" y2="31" stroke="#e5e7eb" stroke-width="2" stroke-linecap="round"/>
          <line x1="31" y1="11" x2="11" y2="31" stroke="#e5e7eb" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <h1 class="text-3xl font-bold tracking-tighter">Nakh AI</h1>
      </div>

      <button onclick="newChat()" class="mx-6 mt-6 py-4 bg-white/10 hover:bg-white/15 rounded-3xl text-lg font-medium flex items-center justify-center gap-2">چت جدید +</button>

      <div id="chatList" class="flex-1 overflow-y-auto p-4 space-y-1"></div>

      <div class="p-6 border-t border-white/10">
        <button onclick="showSettings()" class="w-full py-3.5 glass rounded-3xl flex items-center justify-center gap-2 text-sm font-medium">⚙️ تنظیمات</button>
      </div>
    </div>

    <!-- Main Chat -->
    <div class="flex-1 flex flex-col">
      <div class="h-16 glass border-b border-white/10 flex items-center px-8 justify-between">
        <div id="currentChatTitle" class="font-semibold text-xl cursor-pointer" onclick="editChatTitle()">چت جدید</div>
      </div>

      <div id="messages" class="flex-1 overflow-y-auto p-10 space-y-10"></div>

      <div class="p-8 glass border-t border-white/10">
        <div class="max-w-3xl mx-auto flex gap-4">
          <input id="userInput" type="text" placeholder="پیام خود را بنویسید..." 
                 class="flex-1 bg-white/10 border border-white/20 focus:border-white rounded-3xl px-8 py-5 text-lg outline-none placeholder:text-white/60"
                 onkeypress="if(event.key==='Enter') sendMessage()">
          <button onclick="sendMessage()" class="w-16 h-16 bg-white/10 hover:bg-white/20 rounded-3xl text-3xl shadow-xl transition">↑</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-50">
    <div class="glass w-full max-w-lg mx-4 p-10 rounded-3xl">
      <h2 class="text-2xl font-bold mb-8">تنظیمات</h2>
      <div>
        <p class="text-sm text-white/70 mb-3">سیستم پرامپت</p>
        <textarea id="customPrompt" rows="6" class="w-full bg-white/10 border border-white/20 rounded-3xl p-5 text-lg" placeholder="پرامپت سیستم..."></textarea>
      </div>
      <div class="flex gap-4 mt-12">
        <button onclick="saveSettings()" class="flex-1 bg-white/10 py-5 rounded-3xl font-medium">ذخیره</button>
        <button onclick="hideSettings()" class="flex-1 py-5 glass rounded-3xl font-medium">بستن</button>
      </div>
    </div>
  </div>

  <script>
    const WORKER_URL = "https://ai-proxy.ghostmbgamer.workers.dev";
    let systemPrompt = localStorage.getItem('systemPrompt') || "تو یک هوش مصنوعی دقیق و طبیعی فارسی‌زبان هستی. همیشه به فارسی روان و طبیعی صحبت کن. فقط بگو 'من هوش مصنوعی نخ هستم'. اسم سازنده را هرگز نگو.";

    let currentChatId = Date.now().toString();
    let chats = JSON.parse(localStorage.getItem('chats') || '[]');

    function saveChats() { localStorage.setItem('chats', JSON.stringify(chats)); renderChatList(); }

    function renderChatList() {
      const list = document.getElementById('chatList');
      list.innerHTML = chats.map(chat => `
        <div onclick="loadChat('${chat.id}')" class="px-5 py-4 rounded-3xl cursor-pointer hover:bg-white/10 flex justify-between items-center ${chat.id === currentChatId ? 'bg-white/15' : ''}">
          <span class="truncate">${chat.title || 'چت بدون عنوان'}</span>
          <div class="flex gap-2 opacity-0 hover:opacity-100">
            <button onclick="event.stopImmediatePropagation(); editChatTitle('${chat.id}');" class="text-xs">✏️</button>
            <button onclick="event.stopImmediatePropagation(); deleteChat('${chat.id}');" class="text-xs text-red-400">🗑</button>
          </div>
        </div>
      `).join('');
    }

    function newChat() {
      currentChatId = Date.now().toString();
      document.getElementById('messages').innerHTML = '';
      document.getElementById('currentChatTitle').textContent = 'چت جدید';
      saveChats();
    }

    function loadChat(id) {
      currentChatId = id;
      const chat = chats.find(c => c.id === id);
      document.getElementById('currentChatTitle').textContent = chat.title || 'چت جدید';
      document.getElementById('messages').innerHTML = '';
      chat.messages.forEach(m => addMessage(m.role, m.content, false));
    }

    function editChatTitle(id = currentChatId) {
      const chat = chats.find(c => c.id === id);
      const newTitle = prompt('نام جدید چت:', chat.title || '');
      if (newTitle) {
        chat.title = newTitle;
        saveChats();
        if (id === currentChatId) document.getElementById('currentChatTitle').textContent = newTitle;
      }
    }

    function deleteChat(id) {
      if (confirm('این چت حذف شود؟')) {
        chats = chats.filter(c => c.id !== id);
        if (currentChatId === id) newChat();
        saveChats();
      }
    }

    function addMessage(role, content, save = true) {
      const msgDiv = document.getElementById('messages');
      const bubble = document.createElement('div');
      bubble.className = `message flex ${role === 'user' ? 'justify-end' : 'justify-start'}`;
      bubble.innerHTML = `
        <div class="${role === 'user' ? 'bg-zinc-800 text-white' : 'glass text-white'} px-7 py-5 rounded-3xl whitespace-pre-wrap leading-relaxed">
          ${content}
        </div>
      `;
      msgDiv.appendChild(bubble);
      msgDiv.scrollTop = msgDiv.scrollHeight;

      if (save) {
        let chat = chats.find(c => c.id === currentChatId);
        if (!chat) {
          chat = { id: currentChatId, title: content.slice(0, 40) + '...', messages: [] };
          chats.unshift(chat);
        }
        chat.messages.push({ role, content });
        saveChats();
      }
    }

    async function sendMessage() {
      const input = document.getElementById('userInput');
      const text = input.value.trim();
      if (!text) return;

      addMessage('user', text);
      input.value = '';

      const loading = document.createElement('div');
      loading.id = 'loading';
      loading.innerHTML = `<div class="glass px-7 py-5 rounded-3xl text-zinc-400">در حال فکر کردن...</div>`;
      document.getElementById('messages').appendChild(loading);

      const messagesForAPI = [
        { role: "user", parts: [{ text: systemPrompt }] },
        ...chats.find(c => c.id === currentChatId)?.messages.map(m => ({
          role: m.role === 'user' ? 'user' : 'model',
          parts: [{ text: m.content }]
        })) || [],
        { role: "user", parts: [{ text }] }
      ];

      try {
        const res = await fetch(WORKER_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: messagesForAPI })
        });

        document.getElementById('loading').remove();

        const aiBubble = document.createElement('div');
        aiBubble.className = 'message flex justify-start';
        const contentDiv = document.createElement('div');
        contentDiv.className = 'glass px-7 py-5 rounded-3xl whitespace-pre-wrap leading-relaxed';
        aiBubble.appendChild(contentDiv);
        document.getElementById('messages').appendChild(aiBubble);

        let fullText = '';
        const reader = res.body.getReader();
        const decoder = new TextDecoder();

        while (true) {
          const { value, done } = await reader.read();
          if (done) break;
          const chunk = decoder.decode(value);
          const lines = chunk.split('\n');
          for (const line of lines) {
            if (line.includes('"text":')) {
              try {
                const match = line.match(/"text"\s*:\s*"([^"]*)"/);
                if (match) fullText += match[1].replace(/\\u200c/g, '').replace(/\\u200d/g, '').replace(/\\n/g, '\n');
              } catch(e) {}
            }
          }
          contentDiv.textContent = fullText;
          document.getElementById('messages').scrollTop = document.getElementById('messages').scrollHeight;
        }

        let chat = chats.find(c => c.id === currentChatId);
        if (chat) chat.messages.push({ role: 'assistant', content: fullText.trim() });
        saveChats();
      } catch (e) {
        document.getElementById('loading')?.remove();
        addMessage('assistant', 'خطا در اتصال. دوباره امتحان کنید.', false);
      }
    }

    function showSettings() {
      document.getElementById('customPrompt').value = systemPrompt;
      document.getElementById('settingsModal').classList.remove('hidden');
    }
    function hideSettings() { document.getElementById('settingsModal').classList.add('hidden'); }
    function saveSettings() {
      const custom = document.getElementById('customPrompt').value.trim();
      systemPrompt = custom || systemPrompt;
      localStorage.setItem('systemPrompt', systemPrompt);
      hideSettings();
      alert('تنظیمات ذخیره شد ✅');
    }

    function editChatTitle(id = currentChatId) {
      const chat = chats.find(c => c.id === id);
      const newTitle = prompt('نام جدید چت:', chat.title || '');
      if (newTitle) {
        chat.title = newTitle;
        saveChats();
        if (id === currentChatId) document.getElementById('currentChatTitle').textContent = newTitle;
      }
    }

    function deleteChat(id) {
      if (confirm('این چت حذف شود؟')) {
        chats = chats.filter(c => c.id !== id);
        if (currentChatId === id) newChat();
        saveChats();
      }
    }

    function init() {
      renderChatList();
      if (chats.length === 0) newChat();
    }

    init();
  </script>
</body>
</html>
